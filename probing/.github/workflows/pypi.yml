# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: '3.12'
          install-cargo-tools: 'true'
          install-python-deps: 'false'
          cache-venv: 'false'

      - name: Prepare wheel bundle
        env:
          SKIP_FRONTEND_CLEAN: "1"
        run: |
          if [ ! -f web/dist/index.html ]; then
            make frontend
          fi
          make wheel-bundle nccl-profiler-lib

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --zig --compatibility manylinux2014 --auditwheel repair --features extension-module,gpu,gpu-cuda,kmsg
          sccache: "true"
          manylinux: auto
          rust-toolchain: stable

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: '3.12'
          install-cargo-tools: 'true'
          install-python-deps: 'false'
          cache-venv: 'false'

      - name: Prepare wheel bundle
        env:
          SKIP_FRONTEND_CLEAN: "1"
        run: |
          if [ ! -f web/dist/index.html ]; then
            make frontend
          fi
          make wheel-bundle

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --features extension-module,gpu,kmsg
          sccache: "true"
          rust-toolchain: stable

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          install-python-deps: 'false'
          install-cargo-tools: 'true'
          cache-venv: 'false'

      - name: Prepare wheel bundle
        env:
          SKIP_FRONTEND_CLEAN: "1"
        run: |
          if [ ! -f web/dist/index.html ]; then
            make frontend
          fi
          make wheel-bundle nccl-profiler-lib

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --features extension-module,gpu,kmsg
          rust-toolchain: stable

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  deploy:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, sdist]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
