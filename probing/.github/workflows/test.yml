name: Run Tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build-linux:
    name: Build wheel and Python tests (Linux 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          install-python-deps: "true"
          cache-venv: "true"
          cache-wheel-test-deps: "true"

      - name: Code style checking
        working-directory: ${{ github.workspace }}
        run: |
          cargo fmt --all -- --check
          (cd web && cargo fmt --all -- --check)
          make lint-rust

      - name: Build wheel
        env:
          SKIP_FRONTEND_CLEAN: "1"
        run: |
          if [ ! -f web/dist/index.html ]; then
            make frontend
          fi
          make wheel-ci

      - name: Install wheel and run Python tests
        run: |
          make install-wheel
          make coverage-python-wheel
        env:
          PROBING: "1"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: probing-wheel
          path: dist/probing-*.whl
          retention-days: 7

      - name: Upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  test:
    name: Python tests (multi-version)
    needs: build-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.12", "3.11", "3.10"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python test environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ matrix.python-version }}
          install-cargo-tools: "false"
          install-python-deps: "false"
          enable-rust: "false"
          enable-zig: "false"
          enable-uv: "false"
          cache-venv: "false"
          cache-wheel-test-deps: "true"

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: probing-wheel
          path: dist

      - name: Install wheel and run tests
        working-directory: ${{ github.workspace }}
        run: |
          make install-wheel
          make test-python-wheel
        env:
          PROBING: "1"

  rust-test:
    name: Rust tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          install-python-deps: "false"
          cache-venv: "false"
          enable-zig: "false"

      - name: Install llvm-tools-preview component
        run: rustup component add llvm-tools-preview --toolchain stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Rust tests and collect coverage
        shell: bash
        run: |
          cargo llvm-cov clean --workspace
          # Do not source show-env here — llvm-cov nextest sets instrumentation itself.
          # extension-module is for the Python wheel only; omit it in lib tests (PyO3 linking).
          # Cdylib-only plugin wrappers share sources with rlib crates; exclude from coverage.
          cargo llvm-cov nextest --workspace --no-default-features \
            --exclude probing-hccl-profapi --exclude probing-nccl-profiler-cdylib
          cargo llvm-cov nextest -p probing-server --no-default-features --features kmsg,gpu,gpu-cuda
          cargo llvm-cov report --lcov --output-path coverage.lcov

      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage.lcov
          retention-days: 30

  macos-test:
    name: macOS tests (Rust + Python)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          install-cargo-tools: "true"
          install-python-deps: "true"
          cache-venv: "true"
          cache-wheel-test-deps: "true"

      - name: Run Rust tests
        run: |
          cargo nextest run --workspace --no-default-features
          cargo nextest run -p probing-server --no-default-features --features kmsg,gpu

      - name: Build frontend and wheel, install, and run Python tests
        env:
          SKIP_FRONTEND_CLEAN: "1"
          PROBING: "1"
        run: |
          if [ ! -f web/dist/index.html ]; then
            make frontend
          fi
          make wheel-ci
          make install-wheel
          make test-python-wheel

  codecov:
    name: Upload coverage to Codecov
    needs: [build-linux, rust-test]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust coverage report
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: .

      - name: Download Python coverage report
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: .

      - name: Check coverage files exist
        run: |
          test -f coverage.lcov
          test -f coverage.xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov,coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
