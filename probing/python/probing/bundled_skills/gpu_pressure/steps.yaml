apiVersion: probing.dev/v1
kind: Skill

metadata:
  id: gpu_pressure
  title: "GPU 显存与利用率压力"
  title_en: "GPU memory and utilization pressure"
  category: memory
  tags: [gpu, VRAM, utilization, 显存, 利用率]
  triggers:
    keywords:
      zh: ["显存不够", "GPU 利用率", "VRAM", "显存占用", "GPU 空闲"]
      en: ["GPU memory", "VRAM", "GPU utilization", "GPU idle"]
  docs: |
    查看 gpu.utilization 采样与 python.torch_trace 中的 allocated 是否一致，
    判断是「真 OOM 风险」还是「利用率低 / 内存碎片」。

spec:
  parameters:
    - name: sample_limit
      type: integer
      default: 20

  steps:
    - id: gpu_latest
      title: "GPU 当前状态 (最近采样)"
      type: sql
      sql: |
        SELECT
          ts,
          name,
          device_id,
          used_bytes,
          total_bytes,
          mem_used_pct,
          gpu_util_pct,
          mem_controller_util_pct
        FROM gpu.utilization
        ORDER BY ts DESC
        LIMIT {sample_limit}
      on_empty: abort
      empty_message: "gpu.utilization 无数据 — 确认 GPU 扩展已启用"

    - id: gpu_devices
      title: "GPU 设备信息"
      type: sql
      sql: |
        SELECT device_id, name, memory_model, chip, total_bytes
        FROM gpu.devices
      on_empty: skip

    - id: torch_allocated_latest
      title: "Torch 视角显存 (最近 step)"
      type: sql
      sql: |
        SELECT
          step,
          max(allocated) AS torch_allocated_mb,
          max(cached) AS torch_cached_mb
        FROM python.torch_trace
        WHERE step >= (SELECT max(step) - 5 FROM python.torch_trace)
        GROUP BY step
        ORDER BY step DESC
      on_empty: skip
      empty_message: "无 torch_trace — MPS/CUDA allocated 仅在 torch profiling 开启时有"

    - id: low_utilization
      title: "低 GPU 利用率采样"
      type: sql
      sql: |
        SELECT ts, gpu_util_pct, mem_used_pct, name
        FROM gpu.utilization
        WHERE gpu_util_pct >= 0 AND gpu_util_pct < 30
        ORDER BY ts DESC
        LIMIT 10
      on_empty: skip

  interpretation:
    rules:
      - id: critical_mem
        when: "step:gpu_latest | column:mem_used_pct | max > 95"
        severity: error
        message: "显存使用率 >95% —  imminent OOM 风险"

      - id: low_gpu_util
        when: "step:low_utilization | rows > 5"
        severity: info
        message: "多次采样 GPU 利用率 <30% — 可能存在 CPU/IO 瓶颈或 batch 过小"

      - id: torch_vs_driver_gap
        when: "step:torch_allocated_latest | rows > 0"
        severity: info
        message: "对比 torch_allocated_mb 与 gpu.used_bytes — 差距大可能有碎片或未释放 cache"

  summary_template: |
    ## GPU 压力
    - **gpu_latest**: 设备 mem_used_pct / gpu_util_pct
    - **torch_allocated_latest**: PyTorch 视角 (MB)
    - 显存涨但 util 低 → 查 DataLoader; util 高 mem 低 → 计算密集

  next_steps:
    - "显存持续上涨 → skill: memory_leak"
    - "MPS Mac → torch.mps.current_allocated_memory 已在 torch_trace 中"
    - "启用更细 profiling → probing.torch.profiling=on,random:0.1"
