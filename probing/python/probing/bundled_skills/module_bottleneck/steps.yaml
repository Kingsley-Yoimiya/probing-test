apiVersion: probing.dev/v1
kind: Skill

metadata:
  id: module_bottleneck
  title: "模块性能瓶颈"
  title_en: "PyTorch module bottleneck"
  category: performance
  tags: [slow, bottleneck, module, torch, 慢, 瓶颈]
  triggers:
    keywords:
      zh: ["慢", "瓶颈", "哪个模块", "变慢", "hotspot", "热点"]
      en: ["slow", "bottleneck", "hotspot", "which module", "slowdown"]
  docs: |
    基于 python.torch_trace 的 post-hook duration，找出最近 step 中最耗时的模块。
    与 torch.profiler 互补：这是长期采样、模块级、低开销视图。

spec:
  parameters:
    - name: recent_steps
      type: integer
      default: 10
      description: "Analyze the last N training steps"
    - name: stage_filter
      type: string
      default: "post forward"
      description: "Hook stage to aggregate (post forward | post step)"

  requires:
    any_tables:
      - python.torch_trace

  steps:
    - id: module_totals
      title: "模块总耗时占比 (最近 step)"
      type: sql
      sql: |
        SELECT
          module,
          stage,
          count(*) AS executions,
          avg(duration) AS avg_sec,
          sum(duration) AS total_sec,
          sum(duration) * 100.0 / sum(sum(duration)) OVER () AS pct_time
        FROM python.torch_trace
        WHERE step > (SELECT max(step) - {recent_steps} FROM python.torch_trace)
          AND stage = '{stage_filter}'
        GROUP BY module, stage
        ORDER BY total_sec DESC
        LIMIT 15
      on_empty: abort
      empty_message: "无 torch_trace — SET probing.torch.profiling=on"

    - id: per_step_breakdown
      title: "逐步耗时分解"
      type: sql
      sql: |
        SELECT
          step,
          sum(CASE WHEN stage = 'post forward' THEN duration ELSE 0 END) AS forward_sec,
          sum(CASE WHEN stage = 'post step' THEN duration ELSE 0 END) AS optim_sec
        FROM python.torch_trace
        WHERE step > (SELECT max(step) - {recent_steps} FROM python.torch_trace)
        GROUP BY step
        ORDER BY step
      on_empty: skip

    - id: step_regression
      title: "step 间耗时回归 (是否越来越慢)"
      type: sql
      sql: |
        WITH per_step AS (
          SELECT step, sum(duration) AS total_sec
          FROM python.torch_trace
          WHERE step > (SELECT max(step) - {recent_steps} FROM python.torch_trace)
            AND stage = '{stage_filter}'
          GROUP BY step
        )
        SELECT
          step,
          total_sec,
          total_sec - lag(total_sec) OVER (ORDER BY step) AS delta_sec
        FROM per_step
        ORDER BY step
      on_empty: skip

    - id: enable_torch_flamegraph
      title: "提示: 打开 Torch 火焰图"
      type: ui
      action: navigate
      view: profiling/torch
      when: "always"

  interpretation:
    rules:
      - id: dominant_module
        when: "step:module_totals | column:pct_time | top > 40"
        severity: info
        message: "单个模块占用 >40% 时间 — 优先优化 {top_module}"

      - id: step_slowdown
        when: "step:step_regression | column:delta_sec | last > 2 * avg(delta_sec)"
        severity: warning
        message: "最近 step 总耗时明显上升 — 对比 step_regression 与 comm_collective"

  summary_template: |
    ## 模块瓶颈
    Top 模块见 **module_totals** (pct_time 列)。
    若 forward_sec vs optim_sec 失衡，见 **per_step_breakdown**。

  next_steps:
    - "打开 Torch 火焰图 (profiling/torch) 看调用栈分布"
    - "分布式变慢 → skill: slow_rank"
    - "需要 CPU 栈 → SET probing.pprof.sample_freq=99, profiling/pprof"
