apiVersion: probing.dev/v1
kind: Skill

metadata:
  id: nccl_culprit_victim
  title: "NCCL culprit / victim 归因"
  title_en: "NCCL culprit vs victim attribution"
  category: distributed
  tags: [NCCL, culprit, victim, proxy, wait, straggler]
  triggers:
    keywords:
      zh: ["罪魁祸首", "受害者", "recv_wait", "gpu_wait", "NCCL 等待", "proxy wait"]
      en: ["NCCL culprit", "NCCL victim", "recv wait", "gpu wait", "proxy wait"]
  docs: |
    基于 nccl.proxy_ops 的 ProxyStep wait 分解，区分：
    - culprit：send_gpu_wait_ns 高（本 rank GPU/计算慢）
    - victim：recv_wait_ns 高（等 peer / 网络）
    需要 NCCL_PROFILER_PLUGIN 加载 probing-nccl-profiler；开发机可用 PROBING_NCCL_MOCK=1。

spec:
  parameters:
    - name: seq_window
      type: integer
      default: 20
      description: "Analyze proxy ops with seq >= max(seq) - window"
    - name: use_global
      type: boolean
      default: true
      description: "Use global.nccl.proxy_ops for multi-node fan-out"

  requires:
    any_tables:
      - nccl.proxy_ops
      - global.nccl.proxy_ops

  steps:
    - id: rank_wait_summary
      title: "各 rank wait 分解汇总"
      type: sql
      sql: |
        SELECT
          rank,
          count(*) AS proxy_ops,
          sum(send_gpu_wait_ns) AS total_gpu_wait_ns,
          sum(recv_wait_ns) AS total_recv_wait_ns,
          sum(send_wait_ns) AS total_send_wait_ns,
          avg(send_gpu_wait_ns) AS avg_gpu_wait_ns,
          avg(recv_wait_ns) AS avg_recv_wait_ns
        FROM {nccl_proxy_table}
        WHERE seq >= (
          SELECT max(seq) - {seq_window}
          FROM {nccl_proxy_table}
        )
        GROUP BY rank
        ORDER BY total_recv_wait_ns DESC
      on_empty: abort
      empty_message: |
        无 nccl.proxy_ops 数据。确认:
        - export NCCL_PROFILER_PLUGIN=$(python -m probing.nccl --plugin-path)
        - export NCCL_PROFILE_EVENT_MASK=26
        - 或 macOS 开发: PROBING_NCCL_MOCK=1 PROBING=1

    - id: culprit_ranking
      title: "Culprit 候选 (send_gpu_wait)"
      type: sql
      sql: |
        SELECT
          rank,
          tp_rank,
          pp_rank,
          dp_rank,
          coll_func,
          sum(send_gpu_wait_ns) AS culprit_wait_ns,
          count(*) AS ops
        FROM {nccl_proxy_table}
        WHERE seq >= (
          SELECT max(seq) - {seq_window}
          FROM {nccl_proxy_table}
        )
        GROUP BY rank, tp_rank, pp_rank, dp_rank, coll_func
        ORDER BY culprit_wait_ns DESC
        LIMIT 10
      on_empty: skip

    - id: victim_ranking
      title: "Victim 候选 (recv_wait)"
      type: sql
      sql: |
        SELECT
          rank,
          tp_rank,
          pp_rank,
          dp_rank,
          coll_func,
          sum(recv_wait_ns) AS victim_wait_ns,
          sum(recv_flush_wait_ns) AS flush_wait_ns,
          count(*) AS ops
        FROM {nccl_proxy_table}
        WHERE seq >= (
          SELECT max(seq) - {seq_window}
          FROM {nccl_proxy_table}
        )
        GROUP BY rank, tp_rank, pp_rank, dp_rank, coll_func
        ORDER BY victim_wait_ns DESC
        LIMIT 10
      on_empty: skip

    - id: role_aligned
      title: "按并行角色 (tp/pp/dp) 对齐"
      type: sql
      sql: |
        SELECT
          tp_rank,
          pp_rank,
          dp_rank,
          sum(send_gpu_wait_ns) AS gpu_wait_ns,
          sum(recv_wait_ns) AS recv_wait_ns,
          count(DISTINCT rank) AS ranks_seen
        FROM {nccl_proxy_table}
        WHERE seq >= (
          SELECT max(seq) - {seq_window}
          FROM {nccl_proxy_table}
        )
          AND tp_rank >= 0
        GROUP BY tp_rank, pp_rank, dp_rank
        ORDER BY recv_wait_ns DESC
      on_empty: skip
      empty_message: "无 tp/pp/dp 列或未设置并行 env — 仅按 torch rank 分析"

    - id: global_fanout
      title: "跨节点 global 视图"
      type: sql
      cluster: true
      when: "{use_global}"
      sql: |
        SELECT
          _host,
          _rank AS probe_rank,
          rank AS torch_rank,
          sum(send_gpu_wait_ns) AS gpu_wait_ns,
          sum(recv_wait_ns) AS recv_wait_ns
        FROM global.nccl.proxy_ops
        WHERE seq >= (
          SELECT max(seq) - {seq_window}
          FROM global.nccl.proxy_ops
        )
        GROUP BY _host, _rank, rank
        ORDER BY recv_wait_ns DESC
      on_empty: skip

    - id: net_qp_hint
      title: "IB QP 延迟 (NetPlugin)"
      type: sql
      sql: |
        SELECT
          rank,
          qp_num,
          avg(duration_ns) AS avg_qp_ns,
          max(duration_ns) AS max_qp_ns,
          count(*) AS events
        FROM {net_qp_table}
        GROUP BY rank, qp_num
        ORDER BY max_qp_ns DESC
        LIMIT 10
      on_empty: skip
      empty_message: "nccl.net_qp 空 — 需要 NCCL_PROFILE_EVENT_MASK 含 NetPlugin(128)"

  variables:
    nccl_proxy_table: "{nccl_proxy_table}"

  interpretation:
    rules:
      - id: culprit_dominates
        when: "step:rank_wait_summary | column:total_gpu_wait_ns | max/min(ratio) > 2"
        severity: warning
        message: "某 rank 的 send_gpu_wait 显著高于其他 rank — 可能是 culprit (本地 GPU 慢)"

      - id: victim_dominates
        when: "step:rank_wait_summary | column:total_recv_wait_ns | max/min(ratio) > 2"
        severity: warning
        message: "某 rank 的 recv_wait 显著高于其他 rank — 可能是 victim (等待 peer/网络)"

      - id: culprit_not_victim
        when: "step:culprit_ranking | rows >= 1 | column:culprit_wait_ns | max > 1000000"
        severity: info
        message: "查看 culprit_ranking 顶部 rank — 对比 victim_ranking 确认是否同一 rank"

  summary_template: |
    ## NCCL culprit / victim
    - **culprit_ranking**: `send_gpu_wait_ns` 最高 → 本地算力瓶颈
    - **victim_ranking**: `recv_wait_ns` 最高 → 等待他人或网络
    - **role_aligned**: 同 tp/pp/dp 切片对比（Megatron 拓扑）
    - 若仅有 python.comm_collective → skill: comm_bottleneck

  next_steps:
    - "culprit 持续同一 rank → gpu_pressure / module_bottleneck"
    - "victim 全体偏高 → 网络/RoCE: comm_bottleneck (rdma.mlx_hca)"
    - "单 rank victim + 其他 culprit → 典型 straggler: slow_rank"
