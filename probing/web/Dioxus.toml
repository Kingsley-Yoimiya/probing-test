[application]
name = "probing-web"
# dx autodetects tailwind.config.js (v3) and compiles on build/serve.
tailwind_input = "tailwind.css"
tailwind_output = "assets/tailwind.css"

[web]
# Release builds emit *.wasm.br / *.js.br companions for static serving.
pre_compress = true

[web.app]
title = "Probing Web Interface"
base_path = "/"

[web.dev]
hot_reload = true

[bundle]
public_url = "/"
base_path = "/"
